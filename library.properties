sentence=Opus codec add-on for PCMFlow, focused on real-time voice (VoIP, ESP-NOW transceivers).
paragraph=Wraps Xiph.Org's libopus (vendored under src/external/opus, BSD-3-Clause) and exposes OpusEncoder / OpusDecoder via PCMFlow's PCMSink / PCMSource interfaces. Operates on raw Opus packets, suitable for ESP-NOW, RTP, UDP, and WebSocket carriers. Ogg/Opus container support is deferred.
